<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Ground Forces — Unit Registry — 2 BBY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050c;--panel:#06090f;--panel2:#080d18;--border:#111e30;--border2:#1a2e45;
  --text:#8aacca;--dim:#3a5570;--bright:#c8e4ff;
  --gold:#c8a84b;--gold2:#e8c86b;
  --empire:#2a5ec8;--empire2:#3a77e8;
  --green:#1a9848;--red:#c83838;--orange:#c87028;--purple:#9966cc;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow-x:hidden}

.stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.stars canvas{width:100%;height:100%}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999}

.corner{position:fixed;width:60px;height:60px;pointer-events:none;z-index:2}
.corner-tl{top:20px;left:20px;border-top:1px solid var(--border2);border-left:1px solid var(--border2)}
.corner-tr{top:20px;right:20px;border-top:1px solid var(--border2);border-right:1px solid var(--border2)}
.corner-bl{bottom:20px;left:20px;border-bottom:1px solid var(--border2);border-left:1px solid var(--border2)}
.corner-br{bottom:20px;right:20px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2)}

/* HEADER */
.site-hdr{position:relative;z-index:10;text-align:center;padding:52px 24px 32px;border-bottom:1px solid var(--border)}
.site-pre{font-size:11px;letter-spacing:6px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.site-title{font-family:'Orbitron',monospace;font-size:clamp(22px,4vw,42px);font-weight:900;color:var(--gold2);letter-spacing:4px;text-transform:uppercase;line-height:1.1;margin-bottom:6px}
.site-sub{font-size:11px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:24px}
.site-divider{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:0 auto 24px}
.hdr-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.hdr-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.hdr-stat-val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--gold2)}
.hdr-stat-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase}
.status-bar{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap}
.status-item{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:2px;color:var(--dim)}
.status-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.sd-empire{background:var(--empire2);box-shadow:0 0 8px var(--empire2)}
.sd-green{background:var(--green);box-shadow:0 0 8px var(--green);animation-delay:.5s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* FILTER BAR */
.filter-bar{position:relative;z-index:10;display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(3,5,12,0.9);align-items:center}
.filter-label{font-size:9px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-right:4px}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:5px 14px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.filter-btn:hover,.filter-btn.active{color:var(--gold2);border-color:var(--gold);background:rgba(200,168,75,0.05)}

/* SECTION LABEL */
.sec-label{position:relative;z-index:10;font-size:9px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;padding:20px 24px 10px;display:flex;align-items:center;gap:12px;background:var(--bg)}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* UNIT GRID */
.unit-grid{position:relative;z-index:10;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);margin:0 0 1px}

/* UNIT CARD */
.unit-card{background:var(--panel);position:relative;overflow:hidden;cursor:pointer;transition:background .2s}
.unit-card:hover{background:var(--panel2)}
.unit-card:hover .card-arrow{color:var(--gold);transform:translateX(3px)}
.unit-card:hover .unit-name{color:var(--gold2)}
.unit-card.hidden{display:none}
.unit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--empire2),transparent);opacity:0;transition:opacity .2s}
.unit-card:hover::before{opacity:1}

/* IMAGE */
.unit-image-wrap{position:relative;width:100%;height:190px;overflow:hidden;background:#010508;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.unit-image-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,var(--panel) 0%,transparent 30%,transparent 70%,var(--panel) 100%);pointer-events:none}
.unit-img{width:100%;height:100%;object-fit:contain;padding:16px;filter:brightness(0.88) saturate(0.6) hue-rotate(180deg) sepia(0.2);transition:filter .3s,transform .3s}
.unit-card:hover .unit-img{filter:brightness(1) saturate(0.8) hue-rotate(180deg) sepia(0.1);transform:scale(1.03)}
.unit-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--dim);opacity:0.4;position:relative}
.ph-icon{font-size:36px;line-height:1}
.ph-text{font-size:9px;letter-spacing:3px;text-transform:uppercase}
.unit-placeholder::before{content:'';position:absolute;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--empire2),transparent);animation:scan 3s ease-in-out infinite;opacity:.2}
@keyframes scan{0%{top:0}100%{top:100%}}

/* TYPE BADGE */
.type-badge{position:absolute;top:8px;left:8px;background:rgba(3,5,12,.9);border:1px solid var(--border);padding:2px 8px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);z-index:5}
.type-badge.infantry{border-color:rgba(42,94,200,.4);color:rgba(130,170,255,.9)}
.type-badge.elite   {border-color:rgba(200,168,75,.4);color:var(--gold)}
.type-badge.special {border-color:rgba(200,40,40,.5);color:rgba(255,120,120,.9)}
.type-badge.officer {border-color:rgba(150,100,220,.35);color:#cc99ff}
.type-badge.vehicle {border-color:rgba(200,112,40,.35);color:var(--orange)}
.type-badge.heavy   {border-color:rgba(200,40,40,.4);color:rgba(220,80,80,.9)}
.type-badge.support {border-color:rgba(26,152,72,.3);color:#44cc88}

/* THREAT PIPS */
.threat-row{position:absolute;bottom:10px;right:12px;display:flex;gap:3px;z-index:5}
.pip{width:8px;height:8px;border:1px solid rgba(42,94,200,.2);background:transparent}
.pip.filled{background:var(--empire2);border-color:var(--empire2);box-shadow:0 0 4px var(--empire2)}
.pip.filled.gold{background:var(--gold);border-color:var(--gold);box-shadow:0 0 4px var(--gold)}
.pip.filled.red{background:var(--red);border-color:var(--red);box-shadow:0 0 4px var(--red)}

/* UPLOAD */
.upload-zone{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:10}
.unit-card:hover .upload-zone{opacity:1}
.upload-btn{background:rgba(3,5,12,.95);border:1px solid var(--gold);color:var(--gold);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:6px 16px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.upload-btn:hover{background:rgba(200,168,75,.1);color:var(--gold2)}
.upload-input{display:none}

/* CARD BODY */
.card-body{padding:14px 16px 18px}
.card-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.unit-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--bright);letter-spacing:2px;line-height:1.35;transition:color .2s;flex:1;margin-right:8px}
.card-arrow{font-size:12px;color:var(--dim);transition:color .2s,transform .2s;margin-top:2px;flex-shrink:0}
.unit-designation{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}

.role-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.role-tag{font-size:8px;padding:1px 6px;border:1px solid var(--border);color:var(--dim);letter-spacing:1px;text-transform:uppercase}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;border-bottom:1px solid rgba(17,30,48,.8)}
.stat-row:last-child{border-bottom:none}
.stat-k{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.stat-v{font-size:9px;color:var(--text);text-align:right}
.stat-v.gold{color:var(--gold)}
.stat-v.green{color:#33dd77}
.stat-v.red{color:#dd4444}
.stat-v.orange{color:var(--orange)}

.weapon-list{margin-bottom:10px}
.weapon-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(17,30,48,.6);font-size:9px}
.weapon-item:last-child{border-bottom:none}
.weapon-dot{width:5px;height:5px;background:var(--empire2);flex-shrink:0;box-shadow:0 0 4px var(--empire2)}
.weapon-name{color:var(--bright);letter-spacing:.1em;flex:1}
.weapon-note{color:var(--dim);font-size:8px}

.unit-desc{font-size:9px;line-height:1.7;color:var(--dim);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.doctrine-box{margin-top:8px;padding:8px 10px;border:1px solid rgba(200,168,75,.2);background:rgba(200,168,75,.03);font-size:9px;line-height:1.55;color:rgba(200,168,75,.6);letter-spacing:.05em}
.doctrine-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.org-row{font-size:8px;color:var(--dim);margin-bottom:6px;line-height:1.5}

/* FOOTER */
.footer{position:relative;z-index:10;text-align:center;padding:20px;border-top:1px solid var(--border);margin-top:1px}
.footer-text{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}

@media(max-width:480px){.unit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="stars"><canvas id="starCanvas"></canvas></div>

<div class="site-hdr">
  <div class="site-pre">Galactic Empire — Classified Level Alpha</div>
  <div class="site-title">Imperial Ground Forces Registry</div>
  <div class="site-sub">Ground Combat Assets — Imperial Handbook Classification</div>
  <div class="site-divider"></div>
  <div class="hdr-stats">
    <div class="hdr-stat"><div class="hdr-stat-val" id="total-count">0</div><div class="hdr-stat-label">Unit Types</div></div>
    <div class="hdr-stat"><div class="hdr-stat-val" id="imaged-count">0</div><div class="hdr-stat-label">Imaged</div></div>
    <div class="hdr-stat"><div class="hdr-stat-val">2 BBY</div><div class="hdr-stat-label">Campaign Date</div></div>
  </div>
  <div class="status-bar">
    <div class="status-item"><div class="status-dot sd-empire"></div>Imperial Ground Active</div>
    <div class="status-item"><div class="status-dot sd-green"></div>Registry Online</div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter //</span>
  <button class="filter-btn active" onclick="filterCards('all',this)">All</button>
  <button class="filter-btn" onclick="filterCards('infantry',this)">Army Infantry</button>
  <button class="filter-btn" onclick="filterCards('elite',this)">Stormtroopers</button>
  <button class="filter-btn" onclick="filterCards('special',this)">Special Units</button>
  <button class="filter-btn" onclick="filterCards('officer',this)">Officers</button>
  <button class="filter-btn" onclick="filterCards('vehicle',this)">Vehicles</button>
  <button class="filter-btn" onclick="filterCards('heavy',this)">Heavy Walkers</button>
  <button class="filter-btn" onclick="filterCards('support',this)">Support</button>
</div>

<div id="unit-grid-root"></div>

<div class="footer">
  <div class="footer-text">Imperial Ground Forces Registry — Imperial Handbook Canon</div>
</div>

<script>
const UNITS = [
  // ARMY INFANTRY
  {id:'army_line',name:'Imperial Army Line Trooper',designation:'Standard Infantry / Line Squad',type:'infantry',threat:2,role:['Line Infantry','Occupation','Fire Support'],org:'Squad of 9 — 1 Sergeant + 8 troopers. Two fire teams.',weapons:[{name:'E-11 Blaster Rifle',note:'Standard issue'},{name:'DH-17 Blaster Pistol',note:'Sidearm'}],stats:[{k:'Squad Size',v:'9 men',cls:''},{k:'Commander',v:'Sergeant',cls:'gold'},{k:'Platoon Size',v:'4 squads / 36 men',cls:''},{k:'Company Size',v:'4 platoons / ~152 men',cls:'gold'},{k:'Branch',v:'Imperial Army',cls:''},{k:'Uniform',v:'Grey/Olive Tunic',cls:''}],desc:"The backbone of Imperial planetary control. Army troopers hold ground, man garrisons, and conduct sustained planetary operations. They are the Empire's occupation force — numerically superior to Stormtroopers and responsible for the day-to-day enforcement of Imperial law.",doctrine:'The Imperial Army, and only the Imperial Army, is equipped to seize and defend a planet. Stormtroopers blitz and withdraw. The Army stays.'},
  {id:'army_heavy',name:'Imperial Army Heavy Weapons Trooper',designation:'Heavy Weapons Squad',type:'infantry',threat:3,role:['Fire Support','Anti-Infantry','Anti-Light Vehicle'],org:'Part of standard platoon structure. 2 heavy troopers per line squad.',weapons:[{name:'T-21 Light Repeating Blaster',note:'Primary sustained fire'},{name:'DLT-19 Heavy Blaster Rifle',note:'Anti-vehicle variant'},{name:'DH-17 Blaster Pistol',note:'Sidearm'}],stats:[{k:'Per Squad',v:'2 heavy troopers',cls:''},{k:'Primary Role',v:'Sustained Fire Support',cls:'gold'},{k:'Branch',v:'Imperial Army',cls:''},{k:'Uniform',v:'Grey/Olive Tunic',cls:''},{k:'Anti-Vehicle',v:'Limited',cls:'orange'},{k:'Anti-Infantry',v:'High',cls:'green'}],desc:"Heavy weapons specialists embedded in standard line squads. The T-21 provides the squad with sustained suppressive fire capability. The DLT-19 variant gives some anti-light vehicle punch. Not to be confused with the SpecForce HWS — these are standard Army troops, not elite gunners.",doctrine:'Every line squad carries two heavies. Firepower through volume, not precision.'},
  {id:'army_sharpshooter',name:'Imperial Army Sharpshooter',designation:'Sharpshooter Squad / Special Missions',type:'infantry',threat:3,role:['Sniper','Long Range Interdiction','Special Missions'],org:'Sharpshooter squads drawn from Special Missions forces. Deployed in Sharpshooter Platoons.',weapons:[{name:'DLT-19X Sniper Rifle',note:'Long range precision'},{name:'E-11 Blaster Rifle',note:'Backup'},{name:'DH-17 Blaster Pistol',note:'Sidearm'}],stats:[{k:'Squad Type',v:'Sharpshooter',cls:'gold'},{k:'Source',v:'Special Missions Forces',cls:''},{k:'Platoon Type',v:'Sharpshooter Platoon',cls:''},{k:'Branch',v:'Imperial Army',cls:''},{k:'Threat Range',v:'Long',cls:'gold'},{k:'Uniform',v:'Grey/Olive + Rangefinder',cls:''}],desc:"Precision fire specialists drawn from the Special Missions branch. Deployed to eliminate high-value targets — Rebel officers, weapons crews, and squad leaders — at range before assault. A Sharpshooter Platoon typically consists of two sharpshooter squads, one engineering squad, and one heavy weapons squad.",doctrine:'Priority targets: rebel officers, E-Web crews, and anyone giving orders.'},
  {id:'army_engineer',name:'Imperial Army Combat Engineer',designation:'Engineering Squad',type:'infantry',threat:2,role:['Demolitions','Fortification','Repair','Breaching'],org:'Engineering squads attached to Special Missions Platoon or company HQ.',weapons:[{name:'DH-17 Blaster Pistol',note:'Sidearm only'},{name:'Shaped Charges',note:'Demolitions'},{name:'Detonite Tape',note:'Breaching'}],stats:[{k:'Squad Type',v:'Engineering',cls:'gold'},{k:'Primary Role',v:'Demolitions / Fortification',cls:''},{k:'Combat Rating',v:'Low',cls:'orange'},{k:'Utility Rating',v:'High',cls:'green'},{k:'Branch',v:'Imperial Army',cls:''},{k:'Uniform',v:'Grey/Olive + Tool Harness',cls:''}],desc:"Combat engineers handle demolition of enemy positions, construction of field fortifications, breaching of hardened structures, and rapid repair of Imperial assets. Not front-line fighters — they work under the protection of line squads. Essential for any assault on a fortified Rebel position.",doctrine:"The engineer squad's job is to make everyone else's job possible."},
  // STORMTROOPER CORPS
  {id:'stormtrooper',name:'Imperial Stormtrooper',designation:'Standard Stormtrooper / Line Corps',type:'elite',threat:3,role:['Shock Infantry','First Strike','Boarding Operations'],org:'Squad of 9 — 1 Sergeant + Corporal + 2 Specialists + 5 Privates. Two fire teams.',weapons:[{name:'E-11 Blaster Rifle',note:'Standard issue — range 300m'},{name:'SE-14r Light Repeating Blaster',note:'Sidearm (officers)'},{name:'Thermal Detonator',note:'1 per trooper — baradium core, 5m blast radius'}],stats:[{k:'Squad Size',v:'9 men',cls:''},{k:'Commander',v:'Sergeant (black tunic)',cls:'gold'},{k:'Platoon',v:'38 men + Lieutenant',cls:''},{k:'Branch',v:'Stormtrooper Corps',cls:'gold'},{k:'Uniform',v:'White Plastoid Armor',cls:''},{k:'Occupation Role',v:'None — first strike only',cls:'red'}],desc:"The Empire's elite shock infantry and its most recognizable soldiers. Stormtroopers are the knife's edge — first to breach, first to establish the beachhead. Unconcerned with long-term occupation. Rapid deployment, rapid withdrawal once the Army arrives to hold. Officers wear black tunics, not the grey of the Army.",doctrine:'We are the first to go in. We do not stop until the objective is achieved. The Army walks in the path we blaze.'},
  {id:'snowtrooper',name:'Cold Assault Stormtrooper (Snowtrooper)',designation:'Cold Environment Specialist',type:'elite',threat:3,role:['Arctic Operations','Cold Weather Assault','Survival'],org:'Deployed in standard squad structure within specialized cold assault companies.',weapons:[{name:'E-11 Blaster Rifle',note:'Standard — cold-weather tuned'},{name:'E-Web Heavy Repeating Blaster',note:'Squad support'},{name:'Thermal Detonator',note:'Standard issue'}],stats:[{k:'Environment',v:'Arctic / Frozen Worlds',cls:''},{k:'Min Temp Rating',v:'-100°C',cls:'gold'},{k:'Branch',v:'Stormtrooper Corps',cls:'gold'},{k:'Uniform',v:'White Sealed Armor + Cape',cls:''},{k:'Notable Units',v:'Snow Hawks / Blizzard Force',cls:''},{k:'Mobility',v:'High in arctic',cls:'green'}],desc:"Snowtroopers operate in temperatures as low as -100 degrees Celsius. Their breather hood recirculates warm air to maintain combat effectiveness in extreme cold. Trained as survivalists as much as soldiers. Famous for the assault on Echo Base, Hoth. Two famous units: Snow Hawks and Blizzard Force.",doctrine:'The cold is not an obstacle. It is a weapon we wield and our enemies cannot.'},
  {id:'sandtrooper',name:'Desert Assault Stormtrooper (Sandtrooper)',designation:'Hot/Arid Environment Specialist',type:'elite',threat:3,role:['Desert Operations','Hot Climate Assault','Arid World Patrol'],org:'Deployed in standard squad structure within desert assault companies. Pauldron color indicates rank.',weapons:[{name:'E-11 Blaster Rifle',note:'Sand-sealed variant'},{name:'T-21 Repeating Blaster',note:'Heavy troopers'},{name:'DLT-19 Heavy Blaster',note:'Some troopers'}],stats:[{k:'Environment',v:'Desert / Arid / Ash',cls:''},{k:'Rank Indicator',v:'Pauldron Color',cls:'gold'},{k:'Branch',v:'Stormtrooper Corps',cls:'gold'},{k:'Uniform',v:'White Armor + Cooling Systems',cls:''},{k:'Notable Deployment',v:'Tatooine (Tantive IV pursuit)',cls:''},{k:'Mobility',v:'High in desert',cls:'green'}],desc:"Sandtroopers specialize in hot, dry, and ash-world environments. Their armor's cooling systems and breathing filters counter extreme heat and airborne particles. Pauldron color designates rank — white for sergeant, orange for unit leaders, black for enlisted.",doctrine:'We find them in the heat and dust. There is nowhere to hide on a desert world.'},
  {id:'seatrooper',name:'Aquatic Assault Stormtrooper (Seatrooper)',designation:'Aquatic / Underwater Specialist',type:'elite',threat:3,role:['Aquatic Operations','Underwater Combat','Oceanic Patrol'],org:'Deployed in aquatic assault companies. Ferried by AT-AT Swimmers.',weapons:[{name:'Modified E-11',note:'Doubles as speargun underwater'},{name:'Thermal Detonator',note:'Standard issue'}],stats:[{k:'Environment',v:'Oceanic / Underwater',cls:''},{k:'Air Supply',v:'1+ hours',cls:'gold'},{k:'Depth Rating',v:'Deep ocean capable',cls:''},{k:'Branch',v:'Stormtrooper Corps',cls:'gold'},{k:'Transport',v:'AT-AT Swimmer / Waveskimmer',cls:''},{k:'Authority',v:'Can commandeer Imperial vessels',cls:'green'}],desc:"Deployed on oceanic worlds to pacify threats beneath the waves. Their armor resists crushing ocean depths and the built-in air supply lasts over an hour. The modified E-11 doubles as a speargun. Seatroopers may commandeer Imperial waveskimmers when needed.",doctrine:"The galaxy's trillion oceans are not a refuge. They are our territory too."},
  {id:'scoutt',name:'Scout Trooper',designation:'Reconnaissance / Biker Scout',type:'elite',threat:2,role:['Reconnaissance','Patrol','Fast Attack','Sniper Support'],org:'Scout platoon structure — 2 scout lances of 5 troopers each + 2 infantry squads.',weapons:[{name:'74-Z Speeder Bike',note:'Primary mount — 500km/hr'},{name:'DLT-19X Sniper Rifle',note:'Designated marksman variant'},{name:'SE-14r Blaster Pistol',note:'Sidearm'}],stats:[{k:'Mount',v:'74-Z Speeder Bike',cls:'gold'},{k:'Max Speed',v:'500+ km/hr',cls:'gold'},{k:'Branch',v:'Stormtrooper Corps',cls:'gold'},{k:'Armor Weight',v:'Lightweight',cls:'green'},{k:'Sniper Variant',v:'Available',cls:''},{k:'Primary Role',v:'Recon / Fast Attack',cls:''}],desc:"Eyes and ears of the Imperial ground force. Scout Troopers use lightweight armor for maximum mobility on their 74-Z speeder bikes. They map terrain, locate Rebel positions, and harass enemy flanks before the main assault.",doctrine:'We find them first. By the time the Rebels know we are there, we are already gone.'},
  // SPECIAL UNITS
  {id:'deathtrooper',name:'Death Trooper',designation:'Imperial Intelligence Special Operations',type:'special',threat:5,role:['Special Operations','HVT Elimination','VIP Protection','Intelligence Operations'],org:'Extremely rare. Operate in small teams (4-12). Report to Imperial Intelligence.',weapons:[{name:'E-11D Blaster Carbine',note:'Primary — modified for suppression'},{name:'DLT-19D Heavy Blaster',note:'Designated marksman role'},{name:'Sonic Imploder',note:'Disorientation grenades'},{name:'DH-17 Blaster Pistol',note:'Sidearm'}],stats:[{k:'Rarity',v:'Extremely Rare',cls:'red'},{k:'Chain of Command',v:'Imperial Intelligence',cls:'red'},{k:'Uniform',v:'Black Sensor-Warping Armor',cls:'gold'},{k:'Augmentations',v:'Body augmented',cls:''},{k:'Team Size',v:'4-12 operatives',cls:''},{k:'Threat Level',v:'Maximum',cls:'red'}],desc:"The most dangerous soldiers in the Imperial military. Death Troopers serve Imperial Intelligence directly — they are not Stormtroopers and do not answer to Corps command. Their black armor is coated with a material that warps electronic sensor readings, making them effectively invisible to standard scanning.",doctrine:'We do not exist. When you see us, the mission is already over.'},

const SECTIONS = [
  {key:'infantry', label:'Imperial Army Infantry'},
  {key:'elite',    label:'Stormtrooper Corps'},
  {key:'special',  label:'Special & Project Units'},
  {key:'officer',  label:'Officers & Command'},
  {key:'vehicle',  label:'Vehicles & Walkers'},
  {key:'heavy',    label:'Heavy Assault Walkers'},
  {key:'support',  label:'Support & Weapons Platforms'},
];

const threatCls = {4:'gold',5:'red'};

function pips(n) {
  let out = '';
  const cls = threatCls[n] || '';
  for (let i=1;i<=5;i++) out += `<div class="pip ${i<=n?'filled'+(cls?' '+cls:''):''}"></div>`;
  return out;
}

function buildGrid() {
  const root = document.getElementById('unit-grid-root');
  root.innerHTML = '';
  SECTIONS.forEach(sec => {
    const units = UNITS.filter(u => u.type === sec.key);
    if (!units.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'sec-label';
    lbl.dataset.section = sec.key;
    lbl.textContent = sec.label;
    root.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'unit-grid';
    grid.dataset.section = sec.key;
    units.forEach(unit => {
      const savedImg = localStorage.getItem('imp_gnd_' + unit.id);
      const imgContent = savedImg
        ? `<img class="unit-img" src="${savedImg}" alt="${unit.name}">`
        : `<div class="unit-placeholder"><div class="ph-icon">▲ ▲ ▲</div><div class="ph-text">Visual Pending</div></div>`;
      const weaponsHTML = (unit.weapons||[]).map(w=>`<div class="weapon-item"><div class="weapon-dot"></div><span class="weapon-name">${w.name}</span><span class="weapon-note">${w.note}</span></div>`).join('');
      const statsHTML = (unit.stats||[]).map(s=>`<div class="stat-row"><span class="stat-k">${s.k}</span><span class="stat-v ${s.cls||''}">${s.v}</span></div>`).join('');
      const rolesHTML = (unit.role||[]).map(r=>`<span class="role-tag">${r}</span>`).join('');
      const card = document.createElement('div');
      card.className = 'unit-card';
      card.dataset.type = unit.type;
      card.dataset.id = unit.id;
      card.innerHTML = `
        <div class="unit-image-wrap">
          ${imgContent}
          <span class="type-badge ${unit.type}">${unit.type}</span>
          <div class="threat-row">${pips(unit.threat||1)}</div>
          <div class="upload-zone">
            <label class="upload-btn" for="up_${unit.id}">+ Add Image</label>
            <input class="upload-input" type="file" id="up_${unit.id}" accept="image/*" onchange="handleUpload(event,'${unit.id}')">
          </div>
        </div>
        <div class="card-body">
          <div class="card-top-row">
            <div class="unit-name">${unit.name}</div>
            <div class="card-arrow">→</div>
          </div>
          <div class="unit-designation">${unit.designation}</div>
          <div class="role-bar">${rolesHTML}</div>
          <div class="stat-grid">${statsHTML}</div>
          <div class="weapon-list">${weaponsHTML}</div>
          ${unit.org ? `<div class="org-row">${unit.org}</div>` : ''}
          <div class="unit-desc">${unit.desc}</div>
          ${unit.doctrine ? `<div class="doctrine-box"><div class="doctrine-label">Doctrine</div>${unit.doctrine}</div>` : ''}
        </div>`;
      grid.appendChild(card);
    });
    root.appendChild(grid);
  });
  updateCounts();
}

function handleUpload(event, id) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const data = e.target.result;
    localStorage.setItem('imp_gnd_' + id, data);
    const card = document.querySelector(`[data-id="${id}"]`);
    const wrap = card.querySelector('.unit-image-wrap');
    const ph = wrap.querySelector('.unit-placeholder');
    if (ph) { const img = document.createElement('img'); img.className='unit-img'; img.src=data; img.alt=id; ph.replaceWith(img); }
    else { const img = wrap.querySelector('.unit-img'); if(img) img.src=data; }
    updateCounts();
  };
  reader.readAsDataURL(file);
}

function filterCards(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.unit-card').forEach(c => {
    c.classList.toggle('hidden', type !== 'all' && c.dataset.type !== type);
  });
  document.querySelectorAll('.sec-label, .unit-grid').forEach(el => {
    el.style.display = type === 'all' ? '' : 'none';
  });
  if (type !== 'all') {
    document.querySelectorAll(`.unit-grid[data-section="${type}"]`).forEach(g => g.style.display = '');
  }
}

function updateCounts() {
  document.getElementById('total-count').textContent = UNITS.length;
  document.getElementById('imaged-count').textContent = UNITS.filter(u => localStorage.getItem('imp_gnd_' + u.id)).length;
}

buildGrid();

// STARFIELD
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function initStars() {
  stars = [];
  for (let i=0;i<200;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2,a:Math.random(),speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2});
}
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    const alpha = s.a*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,210,255,${alpha})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
